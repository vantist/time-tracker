name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # GITHUB_TOKEN cannot create pull requests when the repository setting
          # "Allow GitHub Actions to create and approve pull requests" is disabled.
          # Use a Personal Access Token (classic) with repo scope stored as
          # RELEASE_PLEASE_TOKEN to bypass this restriction.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
